# === 체인 방향별 Step 역할 정의 ===
chain_directions:
  depth:
    label: "깊이 (Depth)"
    step_roles:
      1: "기초/정보형"
      2: "분석/응용형"
      3: "전문/심화형"
  swallow:
    label: "역방향 (Swallow)"
    step_roles:
      1: "구매/소비형"
      2: "절약/관리형"
      3: "금융/투자형"
  lateral:
    label: "횡방향 (Lateral)"
    step_roles:
      1: "주제/정보형"
      2: "비교/탐색형"
      3: "비즈니스/확장형"

# === 키워드 성격 → 체인 방향 매핑 ===
keyword_mapping:
  shopping: swallow
  tech: depth
  travel: lateral
  issue: depth
  general: depth

# === 체인 뎁스별 블로그 할당 ===
chain_blogs:
  0: rotcha
  1: infohot
  2: techpawz

# === 체인 방향별 기본 블로그 매핑 (Phase 3) ===
chain_blog_mapping:
  default:
    depth: [rotcha, infohot, techpawz]
    swallow: [rotcha, infohot, techpawz]
    lateral: [rotcha, infohot, techpawz]
  overrides: {}

# === AI Writer 설정 ===
ai_writer:
  tier: default
  temperature: 0.85

# === 발행 모드 설정 (Phase 3) ===
publish_mode:
  default: auto
  confirm_before_publish: true
  retry_on_failure: 3

# === Pollinations.ai 이미지 생성 ===
pollinations:
  enabled: true
  base_url: https://image.pollinations.ai/prompt/
  width: 1024
  height: 1024
  model: flux
  rate_limit_seconds: 15

# === Loop 퍼널 설정 (Phase 6) ===
loop:
  hub_url_base: https://rotcha.kr/hub
  spokes_per_hub: 3
  hub_layout: hub
  cardView: true
  cta:
    info_cta_text: "관련 글 모두 보기 →"
    conv_cta_text: "추천 상품 보기 →"
    conv_cta_url: ""

# === 검색 증강 작성 (Phase 7) ===
search:
  enabled: true
  provider: naver
  max_sources: 5
  endpoints_by_angle:
    basic: ["encyc", "kin", "webkr"]
    advanced: ["webkr", "news", "blog"]
    expert: ["news", "webkr", "cafearticle"]
  display_per_endpoint: 5
  timeout: 10
  daily_quota: 25000

thumbnail:
  provider: auto
  fallback_chain:
    - pexels
    - pollinations
    - krea
  target_size: [1024, 1024]

# === 체인 DB 경로 ===
db_path: /Users/twinssn/Projects/5000/data/mc_chains.db
